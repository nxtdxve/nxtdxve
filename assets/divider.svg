<svg xmlns="http://www.w3.org/2000/svg" width="400" height="4" viewBox="0 0 400 4">
  <defs>
    <linearGradient id="d" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F97316" stop-opacity="0"/>
      <stop offset="50%" stop-color="#F97316" stop-opacity="1"/>
      <stop offset="100%" stop-color="#F97316" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <line x1="0" y1="2" x2="400" y2="2" stroke="url(#d)" stroke-width="2" stroke-linecap="round"
        stroke-dasharray="400" stroke-dashoffset="400">
    <animate attributeName="stroke-dashoffset" from="400" to="0" dur="1s" fill="freeze"/>
  </line>
</svg>
